<title>Flaggenquiz</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#0b3d91,#1f6feb);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    background:#0e2a66;
    padding:25px;
    border-radius:18px;
    width:95%;
    max-width:420px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}
#flag{
    width:100%;
    max-height:230px;
    object-fit:contain;
    border:5px solid black;
    border-radius:8px;
    background:white;
    margin-bottom:20px;
}
input{
    width:90%;
    padding:14px;
    border-radius:10px;
    border:none;
    font-size:18px;
    text-align:center;
}
button{
    margin-top:12px;
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#ffd43b;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
.popup{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 25px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    z-index:10;
    display:none;
}
.correct{background:#2ecc71;color:black;}
.wrong{background:#e74c3c;color:white;}
</style>
</head>

<body>

<div class="card" id="login">
<h1>🔐 Passwort</h1>
<input id="pw" type="password" placeholder="Passwort eingeben">
<br>
<button onclick="checkPassword()">Start</button>
<p id="pwerror" style="color:#ffb3b3;"></p>
</div>

<div class="card" id="quiz" style="display:none;">
<h1>🌍 Flaggenquiz</h1>
<img id="flag">
<input id="answer" placeholder="Land eingeben...">
<br>
<button onclick="checkAnswer()">Prüfen</button>
<p id="progress"></p>
</div>

<div id="popup" class="popup"></div>

const password="flagge100";
function checkPassword(){
    if(document.getElementById("pw").value===password){
        document.getElementById("login").style.display="none";
        document.getElementById("quiz").style.display="block";
        startGame();
    } else {
        document.getElementById("pwerror").innerText="Falsches Passwort!";
    }
}

// Spielvariablen
let queue=[];
let wrongCount={};
let current=null;

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function startGame(){
queue=Object.keys(countries);
shuffle(queue);
nextFlag();
}

function nextFlag(){
if(queue.length===0){
alert("🎉 Du hast alle Flaggen geschafft!");
return;
}
current=queue.shift();
document.getElementById("flag").src = "https://flagcdn.com/256x192/"+current+".png";
document.getElementById("answer").value="";
document.getElementById("answer").focus();
document.getElementById("progress").innerText="Übrig: "+queue.length;
}

function normalize(t){
return t.toLowerCase().trim();
}

function showPopup(text,type,auto){
const popup=document.getElementById("popup");
popup.className="popup "+type;
popup.innerHTML=text;
popup.style.display="block";
if(auto){
setTimeout(()=>{popup.style.display="none";nextFlag();},1500);
}
}

function checkAnswer(){
let input=normalize(document.getElementById("answer").value);
let correct=normalize(countries[current]);
if(input===correct){
showPopup("Richtig! ✅","correct",true);
}else{
wrongCount[current]=(wrongCount[current]||0)+1;
if(wrongCount[current]>=3){
showPopup("Lösung: "+countries[current]+"<br><button onclick='closeWrong()'>OK</button>","wrong",false);
}else{
queue.push(current);
shuffle(queue);
showPopup("Falsch! Lösung: "+countries[current]+"<br><button onclick='closeWrong()'>OK</button>","wrong",false);
}
}
}

function closeWrong(){
document.getElementById("popup").style.display="none";
nextFlag();
}

document.getElementById("answer").addEventListener("keypress",function(e){
if(e.key==="Enter") checkAnswer();
});
</script>
